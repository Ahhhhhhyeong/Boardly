services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boardly-backend
    working_dir: /app
    env_file:
      - .env
    command: sh -c "PORT=${BACKEND_PORT:-3000} npm run dev"
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boardly-frontend
    working_dir: /app
    env_file:
      - .env
    command: sh -c "npm run dev -- --host ${FRONTEND_HOST:-0.0.0.0} --port ${FRONTEND_PORT:-5173}"
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    depends_on:
      - backend
    restart: unless-stopped